<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Guide Mobile</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:#f6f7fb;
  color:#1f2937;
}

/* HEADER MOBILE */
.header{
  background:white;
  padding:16px;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  z-index:10;
}

.header h1{
  font-size:16px;
}

/* CONTAINER */
.container{
  padding:16px;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0ea5e9,#6366f1);
  color:white;
  padding:20px;
  border-radius:18px;
}

.hero h2{
  font-size:22px;
  margin-bottom:8px;
}

.hero p{
  font-size:13px;
  opacity:0.9;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:12px;
  background:white;
  color:#111827;
  text-align:center;
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
}

/* MENU GRID */
.menu{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  background:white;
  padding:14px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.card h3{
  font-size:14px;
  margin-bottom:6px;
}

.card p{
  font-size:12px;
  color:#6b7280;
}

/* BOTTOM NAV (mobile style Airbnb) */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.bottom-nav a{
  text-decoration:none;
  font-size:12px;
  color:#374151;
  text-align:center;
}

/* espace pour éviter que le bas cache le contenu */
.spacer{
  height:70px;
}

</style>

</head>

<body>

<div class="header">
  <img src="logocampanile.png" alt="logocampanile" />
  <h1>Campanile Arras Saint-Nicolas</h1>
</div>

<div class="container">

  <div class="hero">
    <h2>Bienvenue 👋</h2>
    <p>Votre guide hôtel accessible depuis votre téléphone.</p>
    <a class="btn" href="tel:+33123456789">Appeler la réception</a>
  </div>

  <div class="menu">

    <div class="card">
      <h3>🛎️ Services</h3>
      <p>Wi-Fi, ménage, réception</p>
    </div>

    <div class="card">
      <h3>🍽️ Restaurant</h3>
      <p>Horaires & menu</p>
    </div>

    <div class="card">
      <h3>📍 Infos</h3>
      <p>Check-in / check-out</p>
    </div>

    <div class="card">
      <h3>🗺️ Plan</h3>
      <p>Accès hôtel</p>
    </div>

  </div>

  <div class="spacer"></div>

</div>

<!-- BOTTOM NAV MOBILE -->
<div class="bottom-nav">
  <a href="#">Accueil</a>
  <a href="#">Services</a>
  <a href="#">Infos</a>
  <a href="#">Contact</a>
</div>

</body>
</html>
